name: Deploy server

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Package
        run: |
          tar --exclude=node_modules --exclude=dist --exclude=coverage --exclude=.git --exclude=.env -czf "$RUNNER_TEMP/server.tar.gz" .
          printf '%s\n' "${{ secrets.SERVER_ENV }}" > "$RUNNER_TEMP/server.env"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p '${{ secrets.SERVER_DEPLOY_PATH }}'"
          scp -i ~/.ssh/deploy_key "$RUNNER_TEMP/server.tar.gz" "$RUNNER_TEMP/server.env" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.SERVER_DEPLOY_PATH }}/"
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "cd '${{ secrets.SERVER_DEPLOY_PATH }}' && tar -xzf server.tar.gz && mv server.env .env && rm server.tar.gz && DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1 docker compose --env-file .env build server && docker compose --env-file .env up -d --wait postgres && docker compose --env-file .env run --rm --no-deps server npm run prisma:deploy && docker compose --env-file .env up -d --no-build --wait server"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "cd '${{ secrets.SERVER_DEPLOY_PATH }}' && set -e && docker compose --env-file .env ps && docker compose --env-file .env logs --tail=100 server && curl -fsS http://localhost:3000/health && curl -fsS http://localhost:3000/docs-json"
