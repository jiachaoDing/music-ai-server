name: Deploy server

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build test stage
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare server env
        run: |
          printf '%s\n' "${{ secrets.SERVER_ENV }}" > "$RUNNER_TEMP/server.env"
          printf '\nSERVER_IMAGE=%s\n' "${IMAGE_NAME}:${GITHUB_SHA}" >> "$RUNNER_TEMP/server.env"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p '${{ secrets.SERVER_DEPLOY_PATH }}'"
          scp -i ~/.ssh/deploy_key compose.yml "$RUNNER_TEMP/server.env" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.SERVER_DEPLOY_PATH }}/"
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "cd '${{ secrets.SERVER_DEPLOY_PATH }}' && mv server.env .env && if [ -n '${{ secrets.GHCR_TOKEN }}' ]; then printf '%s\n' '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' --password-stdin; fi && docker compose --env-file .env pull server && docker compose --env-file .env up -d --wait postgres && docker compose --env-file .env run --rm --no-deps server npm run prisma:deploy && docker compose --env-file .env up -d --no-build --wait server"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "cd '${{ secrets.SERVER_DEPLOY_PATH }}' && set -e && docker compose --env-file .env ps && docker compose --env-file .env logs --tail=100 server && curl -fsS http://localhost:3000/health && curl -fsS http://localhost:3000/docs-json"
