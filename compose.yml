services:
  postgres:
    image: postgres:16-alpine
    container_name: music-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-music_ai}
      POSTGRES_USER: ${POSTGRES_USER:-music_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  server:
    image: ${SERVER_IMAGE:-music-ai-server:local}
    build:
      context: .
      target: runtime
    container_name: music-ai-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-music_ai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-music_ai}?schema=public
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "${SERVER_PORT:-3000}:3000"
    command: ["node", "dist/main.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  postgres_data:
